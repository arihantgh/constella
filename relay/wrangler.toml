name = "constella-relay"
main = "src/index.ts"
compatibility_date = "2025-09-01"

# ── Durable Object ────────────────────────────────────────────

[[durable_objects.bindings]]
name = "EventRoom"
class_name = "EventRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EventRoom"]

# ── Cron trigger (every minute — Cloudflare uses 5-field cron) ─

[triggers]
crons = ["*/1 * * * *"]

# ── Environment variables ─────────────────────────────────────

[vars]
RPC_URL = "https://soroban-testnet.stellar.org"
CONTRACT_IDS = "CCGU7AL3TEY4437642KZ35VRKDGI3HLVNIGA2MRI4X3ADNUVD4SGSWPR,CCXOG3GGOPRPWX2ICTNOT6EVE73YPLC6SVQJNIY4KKXF5IMDT6ONFODA,CA6LGV5R6R4YLBXCEZM5D5FZJBOOH3UHR3OCHRPDTJPAMY3MUZQLCHKJ"
POLL_INTERVAL_MS = "30000"
RELAY_VERSION = "1.0.0"
