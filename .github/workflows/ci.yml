name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ── Contracts: build + test ──────────────────────────────
  contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build WASM artifacts
        working-directory: contracts
        run: cargo build --release --target wasm32v1-none

      - name: Run all contract tests
        working-directory: contracts
        run: cargo test --verbose

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --check

      - name: Verify WASM files exist
        run: ls -la contracts/target/wasm32v1-none/release/*.wasm

  # ── Frontend: lint + typecheck + test + build ────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

  # ── E2E: Playwright against mocked contracts ─────────────
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run e2e tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
